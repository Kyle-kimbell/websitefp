<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>North Valley Monitoring Demo</title>
    <meta
      name="description"
      content="Live North Valley Monitoring demo powered by a cloud-connected ESP32 ultrasonic sensor."
    />
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card">
        <p class="eyebrow">North Valley Monitoring</p>
        <h1>Live Sensor Demo</h1>
        <p class="lede">
          This page is meant to show a farmer the latest reading from the field,
          from anywhere.
        </p>

        <div class="reading-grid">
          <article class="reading-panel">
            <span class="panel-label">Distance</span>
            <strong class="panel-value" id="distanceValue">--</strong>
            <span class="panel-meta">Ultrasonic probe</span>
          </article>
          <article class="reading-panel">
            <span class="panel-label">Status</span>
            <strong class="panel-value" id="statusValue">Waiting</strong>
            <span class="panel-meta" id="updatedValue">No reading yet</span>
          </article>
        </div>

        <div class="demo-actions">
          <button class="button" id="refreshButton" type="button">Refresh</button>
          <a class="text-link" href="/">Back to site</a>
        </div>

        <p class="message" id="message">
          Configure your public sensor endpoint in <code>demo/config.js</code>.
        </p>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="demo.js"></script>
  </body>
</html>
